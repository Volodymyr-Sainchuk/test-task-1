<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Selection Task</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <h1 class="title">Text Selection Task</h1>

      <section class="controls">
        <label for="text-input">Enter text</label>
        <input id="text-input" type="text" placeholder="Type something..." />
        <button id="show-text-button" type="button">Show text</button>
        <button id="change-color-button" type="button">Change Selected Color</button>
        <button id="reset-button" type="button">Reset</button>
        <button id="return-button" type="button">Return</button>
      </section>

      <section class="result">
        <h2>Output</h2>
        <div id="output-area" class="output-area"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
